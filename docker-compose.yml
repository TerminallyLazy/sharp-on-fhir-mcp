# Local-dev / self-hosted stack for sharp-fhir-mcp.
#
# A single-service stack: the FHIR MCP server runs in one container and
# embeds mem0 (Apache-2.0) as a Python library — there's no separate memory
# service, no Postgres, no dashboard. Memory state persists in a named
# Docker volume (`mem0_data`) so it survives container rebuilds.
#
# Quickstart:
#   cp .env.example .env
#   # set OPENAI_API_KEY (or OPENAI_API_BASE for an OpenAI-compat provider)
#   docker compose up --build
#
# To run with no memory backend (just the FHIR MCP tools), set
# `MEM0_DISABLED=1` in `.env` — the memory_* tools will simply be omitted.

services:
  sharp-fhir-mcp:
    container_name: sharp-fhir-mcp
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SHARP_STRICT_CONTEXT: ${SHARP_STRICT_CONTEXT:-0}
      # Local-dev FHIR fallback (only used when no SHARP headers supplied).
      FHIR_SERVER_URL: ${FHIR_SERVER_URL:-}
      FHIR_ACCESS_TOKEN: ${FHIR_ACCESS_TOKEN:-}
      PATIENT_ID: ${PATIENT_ID:-}
      # mem0 (clinical memory). Required for memory_* tools.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      MEM0_DISABLED: ${MEM0_DISABLED:-0}
      MEM0_LLM_PROVIDER: ${MEM0_LLM_PROVIDER:-openai}
      MEM0_LLM_MODEL: ${MEM0_LLM_MODEL:-gpt-4o-mini}
      MEM0_EMBED_PROVIDER: ${MEM0_EMBED_PROVIDER:-openai}
      MEM0_EMBED_MODEL: ${MEM0_EMBED_MODEL:-text-embedding-3-small}
      MEM0_VECTOR_STORE: ${MEM0_VECTOR_STORE:-chroma}
      MEM0_DATA_DIR: /data/mem0
    ports:
      - "${SHARP_HOST_PORT:-8000}:8000"
    volumes:
      - mem0_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  mem0_data:
